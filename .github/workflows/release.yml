name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to build (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            goos: darwin
            arch: arm64
          - os: windows-latest
            goos: windows
            arch: amd64
          - os: ubuntu-22.04
            goos: linux
            arch: amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Add Go bin to PATH
        shell: bash
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Compute version + ldflags
        shell: bash
        run: |
          REF="${{ github.event.inputs.tag || github.ref_name }}"
          VER="${REF#v}"
          echo "VERSION=$VER" >> "$GITHUB_ENV"
          echo "LDFLAGS=-X main.version=$VER -X main.commit=${GITHUB_SHA::7} -X main.date=$(date -u +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Build CLI
        shell: bash
        run: |
          mkdir -p dist staging
          OUT=audiosync
          [ "${{ matrix.goos }}" = "windows" ] && OUT=audiosync.exe
          go build -ldflags "$LDFLAGS" -o "staging/$OUT" ./cmd/audiosync

      - name: Build desktop app
        shell: bash
        run: |
          cd desktop
          wails build -ldflags "$LDFLAGS"

      - name: Stage desktop bundle (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: cp -R desktop/build/bin/audiosync-desktop.app "staging/AudioSync.app"

      - name: Stage desktop bundle (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: cp desktop/build/bin/audiosync-desktop.exe "staging/AudioSync.exe"

      - name: Stage desktop bundle (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: cp desktop/build/bin/audiosync-desktop "staging/audiosync-desktop"

      - name: Package (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: ditto -c -k --keepParent staging "dist/audiosync_${VERSION}_darwin_arm64.zip"

      - name: Package (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: tar -czf "dist/audiosync_${VERSION}_linux_amd64.tar.gz" -C staging .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path staging/* -DestinationPath "dist/audiosync_${env:VERSION}_windows_amd64.zip"

      - name: Publish to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: AudioSync ${{ github.event.inputs.tag || github.ref_name }}
          draft: false
          prerelease: ${{ startsWith(env.VERSION, '0.') }}
          append_body: true
          body: |
            Stream system audio from N computers to one set of headphones.

            **Artifacts** (each archive contains the `audiosync` CLI + the desktop app):
            - `*_darwin_arm64.zip` — macOS (Apple Silicon)
            - `*_windows_amd64.zip` — Windows
            - `*_linux_amd64.tar.gz` — Linux

            macOS/Windows builds are **unsigned**: macOS users right-click the app → Open
            to bypass Gatekeeper. See the [CHANGELOG](CHANGELOG.md) for details.
          files: |
            dist/*.zip
            dist/*.tar.gz
