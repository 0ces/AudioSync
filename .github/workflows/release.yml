name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to build (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            goos: darwin
            arch: arm64
          - os: windows-latest
            goos: windows
            arch: amd64
          - os: ubuntu-22.04
            goos: linux
            arch: amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Add Go bin to PATH
        shell: bash
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Compute version + ldflags
        shell: bash
        run: |
          REF="${{ github.event.inputs.tag || github.ref_name }}"
          VER="${REF#v}"
          echo "VERSION=$VER" >> "$GITHUB_ENV"
          echo "LDFLAGS=-X main.version=$VER -X main.commit=${GITHUB_SHA::7} -X main.date=$(date -u +%Y-%m-%d)" >> "$GITHUB_ENV"
          # MACOS_SIGN turns on the (dormant) notarization path below only when a
          # signing certificate secret is present. See the secrets table in README.
          echo "MACOS_SIGN=${{ secrets.MACOS_CERTIFICATE != '' }}" >> "$GITHUB_ENV"

      - name: Build CLI
        shell: bash
        run: |
          mkdir -p dist staging
          OUT=audiosync
          [ "${{ matrix.goos }}" = "windows" ] && OUT=audiosync.exe
          go build -ldflags "$LDFLAGS" -o "staging/$OUT" ./cmd/audiosync

      - name: Build desktop app
        shell: bash
        run: |
          cd desktop
          wails build -ldflags "$LDFLAGS"

      - name: Stage desktop bundle (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: cp -R desktop/build/bin/audiosync-desktop.app "staging/AudioSync.app"

      # --- macOS Developer ID signing + notarization (dormant until secrets exist) ---
      # Required secrets (see README "Enabling macOS notarization"):
      #   MACOS_CERTIFICATE      base64 of the Developer ID Application .p12
      #   MACOS_CERTIFICATE_PWD  password for the .p12
      #   DEVELOPER_ID           "Developer ID Application: Name (TEAMID)"
      #   AC_API_KEY             base64 of the App Store Connect API key (.p8)
      #   AC_API_KEY_ID          API key id
      #   AC_API_ISSUER_ID       API key issuer id
      - name: Import signing certificate (macOS)
        if: runner.os == 'macOS' && env.MACOS_SIGN == 'true'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PWD="$(openssl rand -base64 24)"
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          echo "$MACOS_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PWD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')

      - name: Sign, notarize, and staple (macOS)
        if: runner.os == 'macOS' && env.MACOS_SIGN == 'true'
        env:
          DEVELOPER_ID: ${{ secrets.DEVELOPER_ID }}
          AC_API_KEY: ${{ secrets.AC_API_KEY }}
          AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
        run: |
          codesign --force --options runtime --timestamp --sign "$DEVELOPER_ID" "staging/audiosync"
          codesign --deep --force --options runtime --timestamp --sign "$DEVELOPER_ID" "staging/AudioSync.app"
          echo "$AC_API_KEY" | base64 --decode > "$RUNNER_TEMP/ac_api.p8"
          ditto -c -k --keepParent "staging/AudioSync.app" "$RUNNER_TEMP/notarize.zip"
          xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --key "$RUNNER_TEMP/ac_api.p8" --key-id "$AC_API_KEY_ID" --issuer "$AC_API_ISSUER_ID" --wait
          xcrun stapler staple "staging/AudioSync.app"

      - name: Stage desktop bundle (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: cp desktop/build/bin/audiosync-desktop.exe "staging/AudioSync.exe"

      - name: Stage desktop bundle (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: cp desktop/build/bin/audiosync-desktop "staging/audiosync-desktop"

      - name: Package (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: ditto -c -k --keepParent staging "dist/audiosync_${VERSION}_darwin_arm64.zip"

      - name: Package (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: tar -czf "dist/audiosync_${VERSION}_linux_amd64.tar.gz" -C staging .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path staging/* -DestinationPath "dist/audiosync_${env:VERSION}_windows_amd64.zip"

      - name: Publish to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: AudioSync ${{ github.event.inputs.tag || github.ref_name }}
          draft: false
          prerelease: ${{ startsWith(env.VERSION, '0.') }}
          body: |
            Stream system audio from N computers to one set of headphones.

            **Artifacts** (each archive contains the `audiosync` CLI + the desktop app):
            - `*_darwin_arm64.zip` — macOS (Apple Silicon)
            - `*_windows_amd64.zip` — Windows
            - `*_linux_amd64.tar.gz` — Linux

            These builds are **unsigned**. First launch:
            - **macOS** (no right-click → Open on macOS 15+): run
              `xattr -dr com.apple.quarantine /path/to/AudioSync.app` then open it, **or**
              System Settings → Privacy & Security → **Open Anyway**.
            - **Windows**: SmartScreen → **More info → Run anyway**.

            See [Installing a release](https://github.com/0ces/AudioSync#installing-a-release)
            and the [CHANGELOG](CHANGELOG.md).
          files: |
            dist/*.zip
            dist/*.tar.gz
