name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: vet + test (engine)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Vet
        run: go vet ./engine/... ./internal/... ./cmd/...
      - name: Test
        run: go test ./...
      - name: gofmt
        run: |
          unformatted="$(gofmt -l . | grep -v desktop/frontend || true)"
          if [ -n "$unformatted" ]; then echo "needs gofmt:"; echo "$unformatted"; exit 1; fi
